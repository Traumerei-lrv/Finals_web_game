<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SLAPTHAT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/landing.css" />
  </head>
  <body>
    <main class="landing-page">
      <section class="intro-sequence" id="introSequence" aria-hidden="true">
        <img src="assets/intro/hand.png" alt="" class="intro-hand" />
        <img src="assets/intro/slap_impact.gif" alt="" class="intro-impact" />
      </section>
      <audio id="slapSfx" preload="auto" src="assets/intro/wapak.wav"></audio>

      <img src="assets/intro/frame.png" alt="" class="side-frame reveal-target" aria-hidden="true" />

      <section class="hero-panel reveal-target" aria-label="Game start menu">
        <img src="assets/intro/landing_logo.png" alt="Slap That" class="landing-logo" />

        <div class="hero-buttons">
          <a href="selection.html" class="landing-btn landing-btn--primary" id="startBtn">Start Game</a>
          <button class="landing-btn landing-btn--secondary" id="howToPlayBtn" type="button">How To Play</button>
        </div>
      </section>

      <section class="howto-modal" id="howToPlayModal" aria-hidden="true" role="dialog" aria-labelledby="howToPlayTitle">
        <div class="howto-card">
          <h2 id="howToPlayTitle">How To Play</h2>
          <p>1. Click Start Game to enter character selection.</p>
          <p>2. Player 1 attacks using <strong>A</strong>, Player 2 attacks using <strong>L</strong>.</p>
          <p>3. First player to drain the opponent&apos;s HP wins the round.</p>
          <button class="landing-btn landing-btn--secondary" id="closeHowToPlayBtn" type="button">Close</button>
        </div>
      </section>
    </main>

    <script src="js/assets.js"></script>
    <script src="js/landing.js"></script>
  </body>
</html>
